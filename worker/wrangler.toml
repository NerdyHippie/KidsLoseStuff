name = "kids-lose-stuff"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "kids-lose-stuff"
database_id = "49d839e4-6d3a-4e1f-ac73-cabffab41f3d"   # wrangler d1 create kids-lose-stuff

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "kids-lose-stuff-photos"     # wrangler r2 bucket create kids-lose-stuff-photos

[vars]
FRONTEND_URL  = "https://kids-lose-stuff`.pages.dev"   # your Cloudflare Pages URL
WORKER_URL    = "https://kids-lose-stuff.nerdiesthippie.workers.dev"

# Set these secrets via: wrangler secret put SECRET_NAME
# GOOGLE_CLIENT_ID        – from Google Cloud Console OAuth 2.0 client
# GOOGLE_CLIENT_SECRET    – from Google Cloud Console OAuth 2.0 client
# JWT_SECRET              – any long random string (openssl rand -hex 32)
# SUPERADMIN_EMAIL        – your Google email; gets full access on first login
