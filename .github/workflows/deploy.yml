name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Deploy worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Set secrets
        run: |
          echo "${{ secrets.WORKER_JWT_SECRET }}"            | npx wrangler secret put JWT_SECRET
          echo "${{ secrets.WORKER_GOOGLE_CLIENT_ID }}"      | npx wrangler secret put GOOGLE_CLIENT_ID
          echo "${{ secrets.WORKER_GOOGLE_CLIENT_SECRET }}"  | npx wrangler secret put GOOGLE_CLIENT_SECRET
          echo "${{ secrets.WORKER_SUPERADMIN_EMAIL }}"      | npx wrangler secret put SUPERADMIN_EMAIL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-worker
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://kids-lose-stuff.nerdiesthippie.workers.dev

      - name: Deploy to Pages
        run: npx wrangler pages deploy dist --project-name kids-lose-stuff
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
