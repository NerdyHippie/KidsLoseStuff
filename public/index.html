<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kids Lose Stuff</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>Kids Lose Stuff</h1>
      <p>Browse the school lost & found and claim an item with minimal information.</p>
    </header>

    <section class="toolbar">
      <label>
        Search
        <input id="searchInput" type="text" placeholder="jacket, water bottle, blue..." />
      </label>
      <label>
        Category
        <select id="categoryFilter">
          <option value="">All categories</option>
        </select>
      </label>
      <label>
        Availability
        <select id="statusFilter">
          <option value="">All</option>
          <option value="available">Available</option>
          <option value="claimed_pending">Claim pending</option>
        </select>
      </label>
    </section>

    <div id="gallery" class="grid"></div>
  </main>

  <div id="claimModal" class="dialog-backdrop">
    <div class="dialog">
      <h2>Claim item</h2>
      <p class="small">Only the minimum information needed to verify the item will be stored.</p>
      <form id="claimForm">
        <input type="hidden" id="claimItemId" />
        <label>Parent email
          <input id="parentEmail" type="email" required />
        </label>
        <label>Student first name
          <input id="studentFirst" type="text" required />
        </label>
        <label>Student last initial
          <input id="studentLastInitial" type="text" maxlength="1" required />
        </label>
        <label>Optional note
          <textarea id="claimNote" placeholder="Anything that helps staff verify ownership"></textarea>
        </label>
        <div class="actions">
          <button type="submit" class="btn-primary">Submit claim</button>
          <button type="button" class="btn-secondary" id="cancelClaimBtn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
